# Workflow to build and test wheels

name: ttcrpy wheel builder

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
    tags:
      - "v*"
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Build the wheels for Linux, Windows and macOS for Python 3.9 and newer
  build_wheels:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout ttcrpy
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # - name: Set up QEMU
      #   if: runner.os == 'Linux'
      #   uses: docker/setup-qemu-action@v4
      #   with:
      #     platforms: all

      - name: Check vtk wheel availability for CPython 3.14t
        id: vtk314t
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import os
          import shutil
          import subprocess
          import sys
          import tempfile

          runner_os = os.environ["RUNNER_OS"]
          if runner_os == "Linux":
            targets = [("manylinux2014_x86_64", "Linux x86_64")]
          elif runner_os == "Windows":
            targets = [("win_amd64", "Windows amd64")]
          elif runner_os == "macOS":
            targets = [
              ("macosx_10_13_x86_64", "macOS x86_64"),
              ("macosx_11_0_arm64", "macOS arm64"),
            ]
          else:
            raise RuntimeError(f"Unsupported runner OS: {runner_os}")

          probe_dir = tempfile.mkdtemp(prefix="vtk-probe-")
          should_skip = False
          for platform_tag, label in targets:
            cmd = [
              sys.executable,
              "-m",
              "pip",
              "download",
              "--disable-pip-version-check",
              "--only-binary=:all:",
              "--no-deps",
              "--python-version",
              "3.14",
              "--implementation",
              "cp",
              "--abi",
                  "cp314t",
              "--platform",
              platform_tag,
              "-d",
              probe_dir,
              "vtk",
            ]
            result = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)
            if result.returncode != 0:
              should_skip = True
              print(f"vtk wheel probe failed for {label}; cp314t wheels will be skipped on this runner.")
              print(result.stdout)
              break
            print(f"vtk wheel probe succeeded for {label}.")

          shutil.rmtree(probe_dir, ignore_errors=True)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"skip_cp314t={'true' if should_skip else 'false'}\n")
          PY

      - name: Build wheels
        if: steps.vtk314t.outputs.skip_cp314t != 'true'
        uses: pypa/cibuildwheel@v3.4.0

      - name: Build wheels (skip cp314t)
        if: steps.vtk314t.outputs.skip_cp314t == 'true'
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux* cp314t-*"

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    # environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    # upload to PyPI on every tag starting with 'v'
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    # if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        # with:
        #   user: __token__
        #   password: ${{ secrets.PYPI_API_TOKEN }}
